apiVersion: apps/v1
kind: Deployment
metadata: 
  name: orders-db
spec:
  replicas: 1
  selector: 
    matchLabels: 
      app: orders-db
  template:
    metadata:
      labels: 
        app: orders-db
    spec:
      containers:
        - name: orders-db
          image: postgres:16.1
          env: 
            - name: POSTGRES_USER
              value: "orders_user"
            - name: POSTGRES_PASSWORD
              value: "12345"
            - name: POSTGRES_DB
              value: "orders"
          ports: 
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata: 
  name: orders-db
spec:
  selector: 
      app: orders-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
          
            
          
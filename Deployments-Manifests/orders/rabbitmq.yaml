apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec: 
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels: 
        app: rabbitmq
    spec: 
      containers: 
        - name: rabbitmq
          image: rabbitmq:3-management
          env: 
            - name: RABBITMQ_DEFAULT_USER
              value: "rabbitmq"
            - name: RABBITMQ_DEFAULT_PASS
              value: "12345"
          ports: 
            - containerPort: 5672  # For AMQP protocol
            - containerPort: 15672 # For RabbitMQ management UI
---
apiVersion: v1
kind: Service
metadata: 
  name: rabbitmq
spec:
  selector: 
    app: rabbitmq
  ports: 
    - name: amqp
      protocol: TCP
      port: 5672
      targetPort: 5672
    - name: http
      protocol: TCP
      port: 15672
      targetPort: 15672 

apiVersion: apps/v1
kind: Deployment
metadata:
  name: carts-db
spec:
  replicas: 1
  selector: 
    matchLabels:
      app: carts-db
  template: 
    metadata: 
      labels: 
        app: carts-db
    spec: 
      containers: 
        - name: carts-db
          image: amazon/dynamodb-local:1.20.0
          ports:
          - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: carts-db
spec: 
  selector: 
    app: carts-db
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000

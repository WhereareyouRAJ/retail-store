apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout
  template:
    metadata:
      labels:
        app: checkout
    spec:
      containers:
      - name: checkout
        image: rajsingh8826/checkout:a8dd069da0beb9d35671be9d5df6af32ffe34826
        env:
        - name: RETAIL_CHECKOUT_PERSISTENCE_PROVIDER
          value: "redis"
        - name: RETAIL_CHECKOUT_PERSISTENCE_REDIS_URL
          value: "redis://checkout-redis:6379"
        - name: RETAIL_CHECKOUT_ENDPOINTS_ORDERS
          value: "http://orders:8080"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata: 
  name: checkout
spec: 
  selector:
    app: checkout
  ports:
  - port: 8080
    targetPort: 8080
apiVersion: apps/v1
kind: Deployment
metadata: 
  name: checkout-redis
spec:
  replicas: 1
  selector: 
    matchLabels: 
      app: checkout-redis
  template: 
    metadata:
      labels:
        app: checkout-redis
    spec:
      containers:
      - name: checkout-redis
        image: redis:6.0-alpine
        ports: 
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-redis
spec:
  selector:
    app: checkout-redis
  ports:
  - port: 6379
    targetPort: 6379
      
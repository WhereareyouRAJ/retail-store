apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
spec: 
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
      - name: ui
        image: rajsingh8826/ui:latest
        env:
        - name: JAVA_OPTS
          value: "-XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/urandom"
        - name: SERVER_TOMCAT_ACCESSLOG_ENABLED
          value: "true"
        - name: RETAIL_UI_ENDPOINTS_CATALOG
          value: "http://catalog:8080"
        - name: RETAIL_UI_ENDPOINTS_CARTS
          value: "http://carts:8080"
        - name: RETAIL_UI_ENDPOINTS_ORDERS
          value: "http://orders:8080"
        - name: RETAIL_UI_ENDPOINTS_CHECKOUT
          value: http://checkout:8080
---
apiVersion: v1
kind: Service
metadata:
  name: ui
spec:
  selector:
    app: ui
  type: LoadBalancer
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
  
          
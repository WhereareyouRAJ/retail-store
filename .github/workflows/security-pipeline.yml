name: 🛡️ Security Pipeline  

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      context:
        required: true
        type: string
        

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx(Multi-Arch)
        uses: docker/setup-buildx-action@v4
      
      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: 🏗️ Build and push Docker image
        id: build_step
        uses: docker/build-push-action@v4
        with:
          context: ${{ inputs.context }}
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:latest
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: true
      
      - name: 🔎 Security scan
        uses: anchore/scan-action@v7
        with:
          image: ${{ vars.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:latest
          fail-build: true
          severity-cutoff: critical
      
      - name: 📝 Digital Signature
        uses: sigstore/cosign-installer@main
        
      - run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY ${DOCKER_USER}/${IMG}:latest
        env:
          DOCKER_USER: ${{ vars.DOCKERHUB_USERNAME }}
          IMG: ${{ inputs.image_name }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
      
      - name: 📊 Update Inventory
        run: |
          echo "TIME: $(date)" >> release.log
          echo "IMAGE: ${{ inputs.image_name }}" >> release.log
          echo "DIGEST: ${{ steps.build_step.outputs.digest }}" >> release.log
          echo "SBOM_ID: ${{ steps.build_step.outputs.metadata }}" >> release.log
          echo "PROVENANCE: ${{ steps.build_step.outputs.provenance }}" >> release.log

      - name: 📤 Upload release log
        uses: actions/upload-artifact@v4
        with:
          name: inventory-${{ inputs.image_name }}
          path: release.log
name: 🛡️ Security Pipeline  

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      context:
        required: true
        type: string
        

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx(Multi-Arch)
        uses: docker/setup-buildx-action@v4
      
      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ${{ inputs.context }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:latest
          platform: linux/amd64,linux/arm64
          sbom: true
          provenance: true
      
      - name: 🔎 Security scan
        uses: anchore/scan-action@v7
        with:
          image: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:latest
          fail-build: true
          severity-cutoff: critical
      
      - name: 📝 Digital Signature
        uses: sigstore/cosign-installer@main
        
      - run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY ${DOCKER_USER}/${IMG}:latest
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          IMG: ${{ inputs.image_name }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
      
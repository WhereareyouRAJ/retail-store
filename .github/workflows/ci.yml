name: Build UI Service

on: 
  push:
    branches: ["main"]
  
jobs:
  build-all: 
    strategy:
      matrix: 
        service: [ui, orders, catalog, checkout, carts]
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to  Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.service }}/
          push: true
          tags: |
            rajsingh8826/${{ matrix.service }}:latest
            rajsingh8826/${{ matrix.service }}:${{ github.sha }}
  
  deploy: 
    needs: build-all
    strategy:
      matrix: 
        service: [ui, orders, catalog, checkout, carts]
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout code
        uses: actions/checkout@v4
      # 1. Install Helm (The professional tool)
      - name: Set up Helm
        uses: azure/setup-helm@v4
      # 2. Deploy using Helm (The "Deep" One-Liner)
      - name: Helm Upgrade
        run: |
          # This generates the YAML and prints it to logs to prove the "CD" works
          helm template ${{ matrix.service }} ./Helm-charts/retail-store \
          --set global.image.tag=${{ github.sha }} \
          --values ./Helm-charts/retail-store/values.yaml

          echo "CD Simulation: Successfully generated Helm manifest for ${{ matrix.service }} with tag ${{ github.sha }}"

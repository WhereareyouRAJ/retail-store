name: Build UI Service

on: 
  push:
    branches: ["main"]
  
jobs:
  build-all: 
    strategy:
      matrix: 
        service: [ui, orders, catalog, checkout, cart]
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to  Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.service }}/
          push: true
          tags: |
            rajsingh8826/${{ matrix.service }}:latest
            rajsingh8826/${{ matrix.service }}:${{ github.sha }}
  
  deploy-simulation:
    runs-on: ubuntu-latest
    needs: build-all
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: "CD Simulation: Update Manifest"
        run: |
          echo "Updating ${{ matrix.service}} manifest with new tag: ${{ github.sha }}"
          #This sed commands simulates the manifests with new image tag.
          sed -i "s|image: rajsingh8826/${{ matrix.service }}:latest|image: rajsingh8826/${{ matrix.service }}:${{ github.sha }}|g" ./Deployments-Manifests/${{ matrix.service }}/${{ matrix.service }}.yaml
          
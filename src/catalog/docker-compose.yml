services:
  catalog:
    build:
      context: .
    hostname: catalog         
    depends_on:
      - catalog-db
        
    restart: always
    cap_drop:
      - all
    security_opt:
      - no-new-privileges:true
    environment:
      - GIN_MODE=release
      - reschedule=on-node-failure
      - RETAIL_CATALOG_PERSISTENCE_PROVIDER=mysql
      - RETAIL_CATALOG_PERSISTENCE_PASSWORD=12345
      - RETAIL_CATALOG_PERSISTENCE_USERNAME=catalog_user
      - RETAIL_CATALOG_PERSISTENCE_NAME=catalogdb
      - RETAIL_CATALOG_PERSISTENCE_ENDPOINT=catalog-db:3306
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: .

  # nosemgrep: yaml.docker-compose.security.writable-filesystem-service.writable-filesystem-service
  catalog-db:
    image: mariadb:10.9
    hostname: catalog-db
    restart: always
    security_opt:
      - no-new-privileges:true
    environment:
      - reschedule=on-node-failure
      - MYSQL_ROOT_PASSWORD=12345
      - MYSQL_ALLOW_EMPTY_PASSWORD=true
      - MYSQL_DATABASE=catalogdb
      - MYSQL_USER=catalog_user
      - MYSQL_PASSWORD=12345
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "catalog_user",
          "-p12345",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
